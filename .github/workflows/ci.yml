name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    name: Windows build and test
    runs-on: windows-latest
    timeout-minutes: 20

    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
      DOTNET_NOLOGO: 1

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore locked dependencies
        run: dotnet restore SoundHaven.sln --locked-mode

      - name: Verify formatting
        run: dotnet format SoundHaven.sln --verify-no-changes --no-restore

      - name: Build with warnings as errors
        run: dotnet build SoundHaven.sln -c Release --no-restore -warnaserror

      - name: Run deterministic tests
        run: >-
          dotnet test SoundHaven.sln
          -c Release
          --no-build
          --no-restore
          --filter "Category!=Live"
          --logger "trx;LogFileName=tests.trx"
          --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults
          if-no-files-found: ignore
