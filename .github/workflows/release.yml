name: Windows release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Semantic version without a leading v
        required: true
        default: 0.1.0
  push:
    tags:
      - v*

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    timeout-minutes: 30

    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
      DOTNET_NOLOGO: 1

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Resolve release version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            $version = "${{ github.ref_name }}".TrimStart("v")
          }
          else {
            $version = "${{ inputs.version }}"
          }

          "value=$version" >> $env:GITHUB_OUTPUT

      - name: Build and validate portable package
        shell: powershell
        run: >-
          .\scripts\Build-Release.ps1
          -Version "${{ steps.version.outputs.value }}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: SoundHaven-${{ steps.version.outputs.value }}-win-x64
          path: |
            artifacts/release/SoundHaven-${{ steps.version.outputs.value }}-win-x64.zip
            artifacts/release/SoundHaven-${{ steps.version.outputs.value }}-win-x64.zip.sha256
          if-no-files-found: error

      - name: Create GitHub release
        if: github.ref_type == 'tag'
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" `
            "artifacts/release/SoundHaven-${{ steps.version.outputs.value }}-win-x64.zip" `
            "artifacts/release/SoundHaven-${{ steps.version.outputs.value }}-win-x64.zip.sha256" `
            --verify-tag `
            --generate-notes `
            --title "SoundHaven ${{ steps.version.outputs.value }}"
